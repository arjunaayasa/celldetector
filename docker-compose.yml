services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blood_cell_marker
      POSTGRES_USER: bloodcell
      POSTGRES_PASSWORD: bloodcell
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloodcell -d blood_cell_marker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.11-slim
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://bloodcell:bloodcell@postgres:5432/blood_cell_marker
    volumes:
      - ./backend:/app
    command: >
      sh -lc "apt-get update
      && apt-get install -y --no-install-recommends libgl1 libglib2.0-0
      && rm -rf /var/lib/apt/lists/*
      && pip install --no-cache-dir -r requirements.txt
      && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
    command: sh -lc "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
